owner: liquibase
repo: liquibase-secure-status

sites:
  - name: Liquibase Secure API
    url: https://github-deployer.liquibase.com/api/health
    expectedStatusCodes:
      - 200
    body: '"status":"UP"'
    maxResponseTime: 5000
  - name: Liquibase Secure Homepage
    url: https://github-deployer.liquibase.com
    maxResponseTime: 5000

status-website:
  cname: status.github-deployer.liquibase.com
  logoUrl: https://www.liquibase.com/wp-content/uploads/2024/10/Liquibase-logo.svg
  name: Liquibase Secure Status
  introTitle: "**Liquibase Secure for GitHub** — Service Status"
  introMessage: Real-time uptime monitoring powered by [Upptime](https://github.com/upptime/upptime). Checks run every 5 minutes via GitHub Actions.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  theme: light

# Incident management
incidents:
  autoClose:
    enabled: true
    minimumAge: 15  # Auto-close incidents shorter than 15 min (false positives)

